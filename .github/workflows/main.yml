name: SlimVector CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

concurrency:
  group: slimvector-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "1"
  IMAGE_NAME: ghcr.io/slimplanet/slimvector

permissions:
  contents: read

jobs:
  ci:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v6
        with:
          global-json-file: global.json

      - name: Restore dependencies
        run: dotnet restore SlimVector.slnx

      - name: Verify formatting
        run: dotnet format SlimVector.slnx --verify-no-changes --no-restore

      - name: Build
        run: dotnet build SlimVector.slnx -c Release --no-restore

      - name: Run tests
        run: dotnet test SlimVector.slnx -c Release --no-build --verbosity normal

  version:
    name: Compute release channel and version
    needs: ci
    runs-on: ubuntu-latest
    outputs:
      channel: ${{ steps.channel.outputs.channel }}
      version: ${{ steps.version.outputs.version }}
      release_tag: ${{ steps.version.outputs.release_tag }}
    steps:
      - name: Check out tested commit
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      # Same convention as SlimFaas: the last commit message selects alpha,
      # beta, or a stable release. "release" is accepted only on main.
      - name: Determine release channel from commit message
        id: channel
        shell: bash
        run: |
          message="$(git log --format=%B -n 1)"
          normalized_message="$(printf '%s' "$message" | tr '[:upper:]' '[:lower:]')"
          channel=default

          if [[ "$normalized_message" == *alpha* ]]; then
            channel=alpha
          fi
          if [[ "$normalized_message" == *beta* ]]; then
            channel=beta
          fi
          if [[ "$normalized_message" == *release* && "${GITHUB_REF}" == "refs/heads/main" ]]; then
            channel=release
          fi

          printf 'Last commit message: %s\n' "$message"
          printf 'Selected channel: %s\n' "$channel"
          echo "channel=$channel" >> "$GITHUB_OUTPUT"

      - name: Compute next semantic version
        id: semver
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          dry_run: true
          fetch_all_tags: true
          release_branches: ".*"

      - name: Compute published version
        id: version
        shell: bash
        env:
          CHANNEL: ${{ steps.channel.outputs.channel }}
          NEXT_VERSION: ${{ steps.semver.outputs.new_version }}
          NEXT_TAG: ${{ steps.semver.outputs.new_tag }}
          PREVIOUS_VERSION: ${{ steps.semver.outputs.previous_version }}
          PREVIOUS_TAG: ${{ steps.semver.outputs.previous_tag }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          base_version="$NEXT_VERSION"
          release_tag="$NEXT_TAG"

          # A rerun on a commit that is already tagged has no "new" version.
          if [[ -z "$base_version" || "$base_version" == "undefined" ]]; then
            base_version="$PREVIOUS_VERSION"
            release_tag="$PREVIOUS_TAG"
          fi

          if [[ ! "$base_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid semantic version computed: $base_version" >&2
            exit 1
          fi
          if [[ -z "$release_tag" || "$release_tag" == "undefined" ]]; then
            release_tag="v$base_version"
          fi

          case "$CHANNEL" in
            release) version="$base_version" ;;
            alpha) version="$base_version-alpha.${GITHUB_RUN_NUMBER}" ;;
            beta) version="$base_version-beta.${GITHUB_RUN_NUMBER}" ;;
            default)
              if [[ "$GITHUB_REF" == "refs/heads/main" ]]; then
                version="$base_version-dev.${GITHUB_RUN_NUMBER}"
              else
                version="$base_version-pr.${PR_NUMBER}.${GITHUB_RUN_NUMBER}"
              fi
              ;;
            *)
              echo "Unsupported release channel: $CHANNEL" >&2
              exit 1
              ;;
          esac

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          {
            echo "### Version"
            echo "- Channel: \`$CHANNEL\`"
            echo "- Container tag: \`$version\`"
          } >> "$GITHUB_STEP_SUMMARY"

  container:
    name: Build and publish container
    needs: version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Check out tested commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Set up QEMU
        if: github.event_name == 'push'
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate container metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          flavor: latest=false
          tags: |
            type=raw,value=${{ needs.version.outputs.version }}
            type=raw,value=${{ needs.version.outputs.channel }},enable=${{ github.event_name == 'push' && needs.version.outputs.channel != 'release' && needs.version.outputs.channel != 'default' }}
            type=raw,value=dev,enable=${{ github.event_name == 'push' && needs.version.outputs.channel == 'default' }}
            type=raw,value=latest,enable=${{ github.event_name == 'push' && needs.version.outputs.channel == 'release' }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.version.outputs.release_tag }},enable=${{ github.event_name == 'push' && needs.version.outputs.channel == 'release' }}
            type=semver,pattern={{major}},value=${{ needs.version.outputs.release_tag }},enable=${{ github.event_name == 'push' && needs.version.outputs.channel == 'release' }}
          labels: |
            org.opencontainers.image.title=SlimVector
            org.opencontainers.image.description=Hybrid vector database for .NET
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ needs.version.outputs.version }}

      - name: Build and publish image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ github.event_name == 'push' && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Attest image provenance
        if: github.event_name == 'push'
        uses: actions/attest@v4
        with:
          subject-name: ${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Add published image to summary
        if: github.event_name == 'push'
        shell: bash
        env:
          VERSION: ${{ needs.version.outputs.version }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          {
            echo "### Published container"
            echo "- Image: \`${IMAGE_NAME}:${VERSION}\`"
            echo "- Digest: \`${DIGEST}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  release:
    name: Create GitHub Release
    needs: [version, container]
    if: github.event_name == 'push' && needs.version.outputs.channel == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out released commit
        uses: actions/checkout@v6

      - name: Prepare Docker release assets
        shell: bash
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          mkdir -p release-assets
          archive="release-assets/slimvector-docker-${VERSION}.tar.gz"
          tar -czf "$archive" Dockerfile .dockerignore compose.single-node.yml compose.cluster.yml compose.geo.yml
          sha256sum "$archive" > "${archive}.sha256"

      - name: Create release and upload Docker assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.version.outputs.release_tag }}
          target_commitish: ${{ github.sha }}
          name: SlimVector ${{ needs.version.outputs.release_tag }}
          generate_release_notes: true
          make_latest: true
          body: |
            ## Docker image

            Multi-architecture image (`linux/amd64`, `linux/arm64`) published on GitHub Container Registry:

            ```bash
            docker pull ${{ env.IMAGE_NAME }}:${{ needs.version.outputs.version }}
            ```

            Immutable reference:

            ```text
            ${{ env.IMAGE_NAME }}@${{ needs.container.outputs.digest }}
            ```

            [Open the container package](${{ github.server_url }}/${{ github.repository }}/pkgs/container/slimvector).
            The attached archive contains the released `Dockerfile`, `.dockerignore`, and Compose definitions; its SHA-256 checksum is attached alongside it.
          files: |
            release-assets/slimvector-docker-${{ needs.version.outputs.version }}.tar.gz
            release-assets/slimvector-docker-${{ needs.version.outputs.version }}.tar.gz.sha256
