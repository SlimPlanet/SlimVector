services:
  primary:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8090:8080"
    environment:
      Storage__Path: /data
      Raft__Mode: SingleNode
      GeoReplication__Enabled: "true"
      GeoReplication__Mode: Asynchronous
      GeoReplication__OriginId: primary-eu-west
      GeoReplication__SecondaryEndpoint: http://secondary:8080
      GeoReplication__SharedSecret: change-this-geo-secret-32-chars-minimum
      GeoReplication__StatePath: /data/geo-replication
    volumes:
      - geo-primary-data:/data

  secondary:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8091:8080"
    environment:
      Storage__Path: /data
      Raft__Mode: SingleNode
      GeoReplication__AcceptIncoming: "true"
      GeoReplication__ReadOnlySecondary: "true"
      GeoReplication__OriginId: secondary-eu-central
      GeoReplication__SharedSecret: change-this-geo-secret-32-chars-minimum
      GeoReplication__StatePath: /data/geo-replication
    volumes:
      - geo-secondary-data:/data

volumes:
  geo-primary-data:
  geo-secondary-data:
